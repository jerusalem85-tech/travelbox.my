name: Build and Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build backend
        run: |
          cd backend
          npm install
          npx prisma generate
          npm run build
          npm prune --production

      - name: Build frontend
        run: |
          cd frontend
          npm install
          NEXT_PUBLIC_API_URL=${{ secrets.API_URL || 'https://travelbox.my/api' }} npm run build

      - name: Create .env for backend
        run: |
          cat > backend/.env << EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          JWT_EXPIRATION=15m
          JWT_REFRESH_EXPIRATION=7d
          PORT=3001
          NODE_ENV=production
          EOF

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy all files via FTP
        env:
          HOST: ${{ secrets.FTP_HOST }}
          USER: ${{ secrets.FTP_USERNAME }}
          PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$USER","$PASS" "$HOST" << 'FTPCMDS'
          set ssl:verify-certificate no
          set ftp:passive-mode on
          set net:timeout 60

          cd /domains/travelbox.my/nodejs
          put $GITHUB_WORKSPACE/server.js

          cd /domains/travelbox.my/nodejs/backend
          lcd $GITHUB_WORKSPACE/backend
          mirror -R --delete dist/ dist/
          mirror -R --delete prisma/ prisma/
          mirror -R --delete --exclude-glob .cache/ node_modules/ node_modules/
          put package.json
          put .env

          cd /domains/travelbox.my/nodejs/frontend
          lcd $GITHUB_WORKSPACE/frontend/.next/standalone
          mirror -R --delete . ./

          cd /domains/travelbox.my/nodejs/frontend/.next
          lcd $GITHUB_WORKSPACE/frontend/.next/static
          mirror -R --delete . ./static/

          mkdir -p /domains/travelbox.my/nodejs/tmp

          cd /domains/travelbox.my/public_html
          put $GITHUB_WORKSPACE/public_html.htaccess -o .htaccess

          quit
          FTPCMDS
