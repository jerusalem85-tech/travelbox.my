name: Deploy to Hostinger

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend

      - name: Build backend
        run: npm run build
        working-directory: ./backend

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL || 'https://travelbox.my/api' }}

      - name: Prune dev dependencies
        run: |
          cd backend && npm prune --production && cd ..
          cd frontend && npm prune --production && cd ..

      - name: Test FTP connection
        run: |
          curl --connect-timeout 15 -s ftp://${{ secrets.FTP_HOST }}/ -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" --list-only && echo "FTP OK"

      - name: Deploy via FTP
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }}; mirror -R -v \
            -x '\.git/' \
            -x 'backend/node_modules/' \
            -x 'frontend/node_modules/' \
            -x 'docker/' \
            -x '\.env' . /"
