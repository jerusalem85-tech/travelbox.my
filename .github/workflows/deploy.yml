name: Deploy to Hostinger

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend

      - name: Build backend
        run: npm run build
        working-directory: ./backend

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL || 'https://travelbox.my/api' }}

      - name: Prune dev dependencies
        run: |
          cd backend && npm prune --production && cd ..
          cd frontend && npm prune --production && cd ..

      - name: Deploy via FTP
        shell: bash
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          echo "${{ secrets.FTP_HOST }} login ${{ secrets.FTP_USERNAME }} password ${{ secrets.FTP_PASSWORD }}" > ~/.netrc
          chmod 600 ~/.netrc
          lftp -e " \
            set ftp:passive-mode on; \
            set net:timeout 30; \
            set net:max-retries 3; \
            mirror -R -v \
              -x '\.git/' \
              -x 'backend/node_modules/' \
              -x 'frontend/node_modules/' \
              -x 'docker/' \
              -x '\.env' \
              . /; \
            quit" "${{ secrets.FTP_HOST }}"
